<div class="container">
  <div class="row justify-content-center align-items-center vh-100">
    <div class="col-md-5 col-lg-4">
      <div class="card shadow-sm">
        <div class="card-header text-center bg-light">
          <h5 class="mb-0">Sign in to your dashboard</h5>
        </div>
        <div class="card-body p-4">
          <form id="signin-form" novalidate>
            <div class="form-group">
              <input
                type="text"
                class="form-control"
                id="username"
                name="username"
                placeholder="Username"
                required
                autocomplete="username"
              />
              <div class="invalid-feedback">Username is required</div>
            </div>
            <div class="form-group">
              <input
                type="password"
                class="form-control"
                id="password"
                name="password"
                placeholder="Password"
                required
                autocomplete="current-password"
              />
              <div class="invalid-feedback">Password is required</div>
            </div>
            <div id="signin-error" class="alert alert-danger d-none" role="alert"></div>
            <button type="submit" class="btn btn-primary btn-signin" id="signin-btn" disabled>
              SIGN IN
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  (function () {
    const form = document.getElementById('signin-form');
    const usernameInput = document.getElementById('username');
    const passwordInput = document.getElementById('password');
    const submitBtn = document.getElementById('signin-btn');
    const errorAlert = document.getElementById('signin-error');

    function validateForm() {
      const isValid = usernameInput.value.trim() !== '' && passwordInput.value.trim() !== '';
      submitBtn.disabled = !isValid;
      return isValid;
    }

    usernameInput.addEventListener('input', validateForm);
    passwordInput.addEventListener('input', validateForm);

    form.addEventListener('submit', async function (event) {
      event.preventDefault();
      errorAlert.classList.add('d-none');

      if (!validateForm()) {
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Signing in...';

      try {
        await window.Auth.login(usernameInput.value.trim(), passwordInput.value);
        await window.Router.navigate('dashboard');
      } catch (err) {
        errorAlert.textContent = err.message || 'Invalid username or password';
        errorAlert.classList.remove('d-none');
        submitBtn.textContent = 'SIGN IN';
        validateForm();
      }
    });

    validateForm();
  })();
</script>
